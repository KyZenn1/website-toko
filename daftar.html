<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodExpress - Daftar Akun Baru</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .register-container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        .register-container h2 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #e65100;
            text-align: center;
        }

        .register-container p {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .alert {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .alert.error { background-color: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .alert.success { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e65100;
        }

        .btn-register {
            background-color: #e65100;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .btn-register:hover {
            background-color: #bf4300;
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .footer-link a {
            color: #e65100;
            text-decoration: none;
            font-weight: bold;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <h2>FoodExpress 🍔</h2>
        <p>Buat akun baru untuk mulai memesan</p>

        <div id="pesanNotif" class="alert"></div>

        <form id="formDaftar" onsubmit="prosesDaftar(event)">
            <div class="form-group">
                <label for="emailDaftar">Alamat Email</label>
                <input type="email" id="emailDaftar" placeholder="Contoh: nama@gmail.com" required>
                <small style="color:#888; font-size:11px;">*Wajib format email yang benar</small>
            </div>

            <div class="form-group">
                <label for="passwordDaftar">Kata Sandi</label>
                <input type="password" id="passwordDaftar" placeholder="Masukkan kata sandi" required minlength="4">
            </div>

            <button type="submit" class="btn-register">Daftar Sekarang</button>
        </form>

        <div class="footer-link">
            Sudah punya akun? <a href="index.html">Masuk Sekarang</a>
        </div>
    </div>

    <script>
        function prosesDaftar(event) {
            event.preventDefault();

            const emailInput = document.getElementById('emailDaftar').value.trim();
            const passInput = document.getElementById('passwordDaftar').value.trim();
            const kotakNotif = document.getElementById('pesanNotif');

            kotakNotif.style.display = 'none';

            // Cek format email harus benar
            const cekFormatEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!cekFormatEmail.test(emailInput)) {
                tampilkanPesan(kotakNotif, "❌ Format email salah! Harus ada @ dan .", "error");
                return;
            }

            // Ambil data akun yang sudah ada di penyimpanan
            let databaseAkun = JSON.parse(localStorage.getItem('daftarAkun')) || [];

            // Cek apakah email sudah pernah dipakai
            const emailSudahAda = databaseAkun.some(akun => akun.email === emailInput);
            if (emailSudahAda) {
                tampilkanPesan(kotakNotif, "⚠️ Email ini sudah terdaftar!", "error");
                return;
            }

            // Simpan akun baru ke penyimpanan
            databaseAkun.push({ email: emailInput, password: passInput });
            localStorage.setItem('daftarAkun', JSON.stringify(databaseAkun));

            // Jika sukses, pindah ke halaman Login (index.html)
            tampilkanPesan(kotakNotif, "✅ Berhasil! Pindah ke Halaman Login...", "success");
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1500);
        }

        function tampilkanPesan(elemen, teks, tipe) {
            elemen.textContent = teks;
            elemen.classList.add(tipe);
            elemen.style.display = "block";
        }
    </script>
</body>
</html>
